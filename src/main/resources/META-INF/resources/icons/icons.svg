    <path d="M2 12v1h12v-1" stroke="currentColor" fill="none" stroke-width="1.5"/>
  </symbol>
  <symbol id="upload" viewBox="0 0 16 16">
    <path d="M8 12V4M8 4L5 7M8 4l3 3" stroke="currentColor" fill="none" stroke-width="1.5"/>
    <path d="M2 12v1h12v-1" stroke="currentColor" fill="none" stroke-width="1.5"/>
  </symbol>
  <symbol id="mute" viewBox="0 0 16 16">
