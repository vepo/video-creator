<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Video Creator user guide — projects, timeline editing, preview, and export.">
    <title>Video Creator — Documentation</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/docs.css">
</head>
<body class="docs-page">
    <header class="docs-header">
        <a href="/" class="docs-header-brand" title="Back to projects">
            <img src="/brand/logo-icon.svg" alt="" width="32" height="32">
            <div>
                <h1 class="docs-header-title">Video Creator</h1>
                <p class="docs-header-subtitle">User documentation</p>
            </div>
        </a>
        <div class="docs-header-meta">
            <span class="docs-version">v{appVersion}</span>
            <span class="docs-updated">Updated {lastUpdated}</span>
        </div>
    </header>

    <main class="docs-main">
        <article class="docs-content">
            {content.raw}
        </article>
    </main>

    <footer class="docs-footer">
        <p>Video Creator {appVersion} — non-linear video editor powered by MLT (melt).</p>
    </footer>
</body>
</html>
