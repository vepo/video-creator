<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Creator — Editor</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/editor.css">
    <script>
        let currentProject = {project.asJson.raw ?: '{}'};
    </script>
    <script src="/javascript/editor.js"></script>
</head>
<body>
    <header class="editor-header">
        <div class="header-left">
            <a href="/" class="logo" title="Back to projects">
                <img src="/brand/logo-icon.svg" alt="" class="logo-icon" width="24" height="24">
                <span>Video Creator</span>
            </a>
            <nav class="menu-bar" aria-label="Main menu">
                <div class="menu-item menu-item--disabled" title="Coming soon" aria-disabled="true">File</div>
                <div class="menu-item menu-item--disabled" title="Coming soon" aria-disabled="true">Edit</div>
                <div class="menu-item menu-item--disabled" title="Coming soon" aria-disabled="true">View</div>
                <div class="menu-item menu-item--disabled" title="Coming soon" aria-disabled="true">Help</div>
            </nav>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" id="saveBtn" type="button" title="Save project">
                <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#export"/></svg>
                Save
            </button>
            <button class="btn btn-secondary" id="playBtn" type="button" title="Generate timeline preview">
                <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#play"/></svg>
                Preview
            </button>
            <button class="btn btn-secondary" id="stopBtn" type="button" aria-label="Stop">
                <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#stop"/></svg>
                Stop
            </button>
            <button class="btn btn-primary" id="exportBtn" type="button">
                <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#export"/></svg>
                Export Video
            </button>
        </div>
    </header>

    <div id="editorStatus" class="editor-status visually-hidden" role="status" aria-live="polite"></div>

    <div class="editor-layout">
        <aside class="project-panel">
            <div class="panel-header">
                <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#folder"/></svg>
                <span>Project Files</span>
                <button class="btn btn-secondary btn-right" id="uploadBtn" type="button"
                        title="Upload media" aria-label="Upload media">
                    <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#upload"/></svg>
                </button>
                <input type="file" id="mediaFileInput" class="visually-hidden" multiple
                       accept="video/*,audio/*,image/*" tabindex="-1" aria-hidden="true">
            </div>
            <div id="project-files-container" class="panel-content">
                <div class="drop-zone">
                    <div class="drop-zone-content">
                        <svg class="icon icon-xl drop-zone-icon" aria-hidden="true"><use href="/icons/icons.svg#upload"/></svg>
                        <div class="drop-zone-text">Drop files to add media</div>
                    </div>
                </div>
                <div class="file-list" id="media-list"></div>
            </div>
        </aside>

        <main class="center-panel">
            <div class="preview-container">
                <video id="previewVideo" class="preview-video visually-hidden" controls playsinline></video>
                <div class="preview-placeholder" id="previewPlaceholder">
                    <svg class="icon preview-placeholder-icon" aria-hidden="true"><use href="/icons/icons.svg#video"/></svg>
                    <div>Video Preview</div>
                    <div class="preview-placeholder-hint">Add clips to the timeline, then click Preview in the header or below</div>
                </div>
                <div id="previewStatus" class="preview-status visually-hidden" aria-live="polite"></div>
                <div class="preview-controls" id="previewControls">
                    <button class="btn btn-secondary" id="previewPrevFrameBtn" type="button" aria-label="Previous frame">|&lt;</button>
                    <button class="btn btn-secondary" id="previewRewindBtn" type="button" aria-label="Rewind">&lt;&lt;</button>
                    <button class="btn btn-primary" id="previewPlayBtn" type="button" aria-label="Play preview">
                        <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#play"/></svg>
                    </button>
                    <button class="btn btn-secondary" id="previewForwardBtn" type="button" aria-label="Forward">&gt;&gt;</button>
                    <button class="btn btn-secondary" id="previewNextFrameBtn" type="button" aria-label="Next frame">&gt;|</button>
                </div>
            </div>

            <div class="timeline-container">
                <div class="timeline-header">
                    <h3>Timeline</h3>
                    <div class="timeline-toolbar">
                        <button class="btn btn-secondary btn-sm" id="addVideoTrackBtn" type="button">+ Video Track</button>
                        <button class="btn btn-secondary btn-sm" id="addAudioTrackBtn" type="button">+ Audio Track</button>
                        <button class="btn btn-secondary btn-sm" id="cutClipBtn" type="button" title="Split selected clip at playhead" disabled>Cut</button>
                        <button class="btn btn-secondary btn-sm" id="deleteClipBtn" type="button" title="Delete selected clip" disabled>Delete</button>
                    </div>
                    <div class="timeline-controls">
                        <button class="btn btn-secondary btn-icon" id="timelineZoomInBtn" type="button" aria-label="Zoom in" title="Zoom in">
                            <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#zoom-in"/></svg>
                        </button>
                        <button class="btn btn-secondary btn-icon" id="timelineZoomOutBtn" type="button" aria-label="Zoom out" title="Zoom out">
                            <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#zoom-out"/></svg>
                        </button>
                        <button class="btn btn-secondary btn-icon" id="timelineFitBtn" type="button" aria-label="Fit timeline" title="Fit timeline to clips">
                            <svg class="icon" aria-hidden="true"><use href="/icons/icons.svg#fit"/></svg>
                        </button>
                    </div>
                    <div class="timeline-zoom-level">
                        <span id="zoomLevelLabel">Zoom: 100%</span>
                    </div>
                </div>
                <div class="timeline-scroll">
                    <div class="scroll-handle"></div>
                </div>
                <div class="timeline-ruler">
                    <div class="ruler-marks" id="rulerMarks"></div>
                </div>

                <div class="tracks-container" id="tracks-container"></div>

                <div class="playhead" id="playhead" role="slider" aria-label="Playhead" aria-valuemin="0" tabindex="0">
                    <div class="playhead-line"></div>
                    <div class="playhead-handle"></div>
                </div>
            </div>
        </main>

        <aside class="properties-panel">
            <div class="properties-tabs" role="tablist">
                <div class="tab active" role="tab">Properties</div>
                <div class="tab" role="tab">Transitions</div>
                <div class="tab" role="tab">Effects</div>
            </div>
            <div class="tab-content">
                <div id="tabComingSoon" class="tab-coming-soon visually-hidden" role="status"></div>
                <div id="item-properties-empty">
                    <p class="placeholder-text">Select an item to edit properties</p>
                </div>
                <div id="item-properties"></div>
                <h3 class="section-heading">Project</h3>
                <div class="property-group">
                    <label for="txt-project-name">Name</label>
                    <input id="txt-project-name" type="text" />
                </div>
                <div class="property-group">
                    <label for="cmb-screen-size">Project Settings</label>
                    <select id="cmb-screen-size">
                        <optgroup label="Standard Definition (SD)">
                            <option value="SD_360p">360p (640x360) - 16:9</option>
                            <option value="SD_480p">480p (854x480) - 16:9</option>
                            <option value="YT_RECOMMENDED_SD">Recommended SD (640x480) - 4:3</option>
                        </optgroup>
                        <optgroup label="High Definition (HD)">
                            <option value="HD_720p" selected>720p HD (1280x720) - 16:9</option>
                            <option value="HD_1080p">1080p Full HD (1920x1080) - 16:9</option>
                            <option value="YT_RECOMMENDED_HD">Recommended HD (1280x720) - 16:9</option>
                            <option value="YT_RECOMMENDED_FULL_HD">Recommended Full HD (1920x1080) - 16:9</option>
                        </optgroup>
                        <optgroup label="Ultra High Definition (4K/8K)">
                            <option value="UHD_1440p">1440p 2K (2560x1440) - 16:9</option>
                            <option value="UHD_2160p">2160p 4K (3840x2160) - 16:9</option>
                            <option value="UHD_4320p">4320p 8K (7680x4320) - 16:9</option>
                            <option value="YT_RECOMMENDED_4K">Recommended 4K (3840x2160) - 16:9</option>
                        </optgroup>
                        <optgroup label="Vertical Video">
                            <option value="VERTICAL_360p">360p Vertical (360x640) - 9:16</option>
                            <option value="VERTICAL_720p">720p Vertical (720x1280) - 9:16</option>
                            <option value="VERTICAL_1080p">1080p Vertical (1080x1920) - 9:16</option>
                        </optgroup>
                        <optgroup label="Square Video">
                            <option value="SQUARE_480p">480p Square (480x480) - 1:1</option>
                            <option value="SQUARE_720p">720p Square (720x720) - 1:1</option>
                            <option value="SQUARE_1080p">1080p Square (1080x1080) - 1:1</option>
                        </optgroup>
                        <optgroup label="YouTube Shorts">
                            <option value="SHORTS_1080x1920">YouTube Shorts (1080x1920) - 9:16</option>
                        </optgroup>
                    </select>
                </div>
                <div class="property-group">
                    <label for="cmb-frame-rate">Frame Rate</label>
                    <select id="cmb-frame-rate">
                        <optgroup label="Film and Cinema">
                            <option value="FPS_24">24 FPS - Traditional Film Standard</option>
                            <option value="FPS_23_976">23.976 FPS - Film (NTSC)</option>
                        </optgroup>
                        <optgroup label="Broadcast Standards">
                            <option value="FPS_25">25 FPS - PAL (Europe, Asia, Australia)</option>
                            <option value="FPS_30">30 FPS - NTSC (North America, Japan)</option>
                            <option value="FPS_29_97">29.97 FPS - NTSC Broadcast</option>
                        </optgroup>
                        <optgroup label="High Frame Rate">
                            <option value="FPS_50">50 FPS - PAL High</option>
                            <option value="FPS_59_94">59.94 FPS - NTSC High</option>
                            <option value="FPS_60">60 FPS - Smooth Action</option>
                        </optgroup>
                        <optgroup label="Ultra High Frame Rate">
                            <option value="FPS_120">120 FPS - Slow Motion</option>
                            <option value="FPS_240">240 FPS - Super Slow Motion</option>
                            <option value="FPS_480">480 FPS - Extreme Slow Motion</option>
                        </optgroup>
                        <optgroup label="Web and Streaming">
                            <option value="FPS_24_WEB">24 FPS - Film Style</option>
                            <option value="FPS_30_WEB" selected>30 FPS - Standard Streaming</option>
                            <option value="FPS_60_WEB">60 FPS - Gaming and Sports</option>
                        </optgroup>
                    </select>
                </div>
                <div class="property-group">
                    <label>Duration</label>
                    <div id="dur-project" class="duration-controller">
                        <input class="hours" type="number" step="1" min="1" max="5" aria-label="Hours" />
                        <input class="minutes" type="number" step="1" min="1" max="59" aria-label="Minutes" />
                        <input class="seconds" type="number" step="1" min="1" max="59" aria-label="Seconds" />
                        <input class="millis" type="number" step="1" min="1" max="999" aria-label="Milliseconds" />
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="exportModal" class="modal" role="dialog" aria-labelledby="export-modal-title" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="export-modal-title">Export Video</h3>
                <button class="close" type="button" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="property-group">
                    <label for="exportFormat">Export Format</label>
                    <select id="exportFormat">
                        <option value="mp4">MP4 (H.264)</option>
                        <option value="webm">WebM (VP9)</option>
                    </select>
                </div>
                <div class="property-group">
                    <label for="exportQuality">Quality</label>
                    <select id="exportQuality">
                        <option value="high">High (1080p)</option>
                        <option value="medium">Medium (720p)</option>
                        <option value="low">Low (480p)</option>
                    </select>
                </div>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p id="progressText">Ready to export</p>
                </div>
                <div id="exportDownload" class="export-download visually-hidden">
                    <a id="exportDownloadLink" class="btn btn-primary" href="#" download>Download video</a>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-export" type="button">Cancel</button>
                <button class="btn btn-primary" id="startExportBtn" type="button">Export</button>
            </div>
        </div>
    </div>
</body>
</html>
